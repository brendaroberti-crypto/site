          <h1> Vôleibol</h1>
          <p></p>O voleibol
          foi criado em 9 de fevereiro de 1895 por William G. Morgan em Massachusetts, EUA, com o nome inicial de "Mintonette". O objetivo era criar um esporte de equipes sem contato físico, visando reduzir o risco de lesões. Chegou ao Brasil em 1915, popularizando-se a partir de então.
